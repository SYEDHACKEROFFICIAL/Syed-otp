<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPRN SMS PANEL | SYSTEM AUTHENTICATION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Courier New', 'Monaco', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #c084fc;
        }

        /* Cyber Grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(#c084fc10 1px, transparent 1px),
                linear-gradient(90deg, #c084fc10 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .container {
            background: #0a0a0a;
            border: 1px solid #c084fc;
            padding: 40px;
            width: 450px;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 30px rgba(192, 132, 252, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #c084fc;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #c084fc;
            font-size: 22px;
            letter-spacing: 2px;
        }

        .header h2 {
            color: #a855f7;
            font-size: 12px;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            padding: 8px 20px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
        }

        .tab-btn.active {
            color: #c084fc;
            border-bottom: 2px solid #c084fc;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #a855f7;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #c084fc;
            color: #c084fc;
            font-family: monospace;
            font-size: 13px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.3);
        }

        .security-box {
            background: #111;
            border: 1px solid #c084fc;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }

        .security-box span {
            display: block;
            color: #a855f7;
            font-size: 11px;
        }

        .security-box .question {
            font-size: 18px;
            color: #ec4899;
            margin: 10px 0;
        }

        .security-box input {
            background: #0a0a0a;
            border: 1px solid #c084fc;
            color: #c084fc;
            padding: 8px;
            width: 100%;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #c084fc;
            color: #c084fc;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #c084fc;
            color: #0a0a0a;
        }

        .info-note {
            text-align: center;
            margin-top: 15px;
            font-size: 10px;
            color: #555;
        }

        .support {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 10px;
            color: #555;
        }

        .support a {
            color: #ec4899;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>IPRN SMS PANEL</h1>
            <h2>SYSTEM AUTHENTICATION V2.0</h2>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('login')">LOGIN</button>
            <button class="tab-btn" onclick="showTab('register')">REGISTER</button>
        </div>

        <!-- LOGIN -->
        <div id="loginForm" class="form active">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <div class="security-box">
                <span>SECURITY CHECK:</span>
                <span class="question" id="securityQuestion">3 + 4 = ?</span>
                <input type="text" id="securityAnswer" placeholder="Your answer">
            </div>
            <button class="btn" onclick="handleLogin()">INITIALIZE CONNECTION</button>
        </div>

        <!-- REGISTER -->
        <div id="registerForm" class="form">
            <div class="input-group">
                <label>FULL NAME</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
            </div>
            <div class="input-group">
                <label>COUNTRY</label>
                <select id="country">
                    <option value="">SELECT COUNTRY</option>
                    <option>Pakistan</option>
                    <option>India</option>
                    <option>Indonesia</option>
                    <option>Zambia</option>
                    <option>Mozambique</option>
                    <option>Sudan</option>
                    <option>Kyrgyzstan</option>
                    <option>Ukraine</option>
                    <option>Venezuela</option>
                </select>
            </div>
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="regUsername" placeholder="Choose username">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="regPassword" placeholder="Choose password">
            </div>
            <div class="input-group">
                <label>CONFIRM PASSWORD</label>
                <input type="password" id="confirmPass" placeholder="Confirm password">
            </div>
            <button class="btn" onclick="handleRegister()">SUBMIT REGISTRATION</button>
            <div class="info-note">Registration requires admin approval</div>
        </div>

        <div class="support">
            Official Support Channel: <a href="#">@sms_panel_official</a>
        </div>
    </div>

    <script>
        let currentUser = null;

        function showTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            
            if(tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        // Security question
        const num1 = Math.floor(Math.random() * 10) + 1;
        const num2 = Math.floor(Math.random() * 10) + 1;
        document.getElementById('securityQuestion').innerHTML = num1 + ' + ' + num2 + ' = ?';
        const correctAnswer = (num1 + num2).toString();

        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const securityAnswer = document.getElementById('securityAnswer').value;

            if(securityAnswer !== correctAnswer) {
                alert('Security check failed!');
                return;
            }

            if(username === 'Syedhacker' && password === '0345Syeddlr') {
                localStorage.setItem('currentUser', JSON.stringify({username: 'Syedhacker', isAdmin: true}));
                window.location.href = 'admin.html';
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if(user && user.approved) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'dashboard.html';
            } else if(user && !user.approved) {
                alert('Account pending approval!');
            } else {
                alert('Invalid credentials!');
            }
        }

        function handleRegister() {
            const fullname = document.getElementById('fullname').value;
            const country = document.getElementById('country').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirmPass = document.getElementById('confirmPass').value;

            if(!fullname || !country || !username || !password) {
                alert('Fill all fields!');
                return;
            }

            if(password !== confirmPass) {
                alert('Passwords do not match!');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const pending = JSON.parse(localStorage.getItem('pending') || '[]');

            if(users.find(u => u.username === username) || pending.find(u => u.username === username)) {
                alert('Username exists!');
                return;
            }

            pending.push({id: Date.now(), fullname, country, username, password, approved: false});
            localStorage.setItem('pending', JSON.stringify(pending));
            alert('Registration submitted! Wait for approval.');
            showTab('login');
        }

        if(!localStorage.getItem('users')) localStorage.setItem('users', '[]');
        if(!localStorage.getItem('pending')) localStorage.setItem('pending', '[]');
    </script>
</body>
</html>
