<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPRN SMS PANEL | SYSTEM AUTHENTICATION V2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            font-family: 'Courier New', 'Monaco', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ff9d;
        }

        .container {
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 30px;
            width: 450px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .header h1 {
            color: #00ff9d;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .header h2 {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            padding: 8px 20px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
        }

        .tab-btn.active {
            color: #00ff9d;
            border-bottom: 2px solid #00ff9d;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
            font-size: 12px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            background: #0a0a15;
            border: 1px solid #333;
            color: #00ff9d;
            font-family: monospace;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ff9d;
        }

        .security-box {
            background: #0a0a15;
            border: 1px solid #333;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }

        .security-box span {
            display: block;
            color: #888;
            font-size: 12px;
        }

        .security-box .question {
            font-size: 18px;
            color: #00ff9d;
            margin: 10px 0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #0a0a15;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00ff9d;
            color: #0a0a15;
        }

        .info-note {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            color: #555;
        }

        .support {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 11px;
            color: #555;
        }

        .support a {
            color: #00ff9d;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>IPRN SMS PANEL</h1>
            <h2>SYSTEM AUTHENTICATION V2.0</h2>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('login')">LOGIN</button>
            <button class="tab-btn" onclick="showTab('register')">REGISTER</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" class="form active">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <div class="security-box">
                <span>SECURITY CHECK:</span>
                <span class="question" id="securityQuestion">3 + 4 = ?</span>
                <input type="text" id="securityAnswer" placeholder="Your answer" style="width:100%; margin-top:10px;">
            </div>
            <button class="btn" onclick="handleLogin()">INITIALIZE CONNECTION</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="form">
            <div class="input-group">
                <label>FULL NAME</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
            </div>
            <div class="input-group">
                <label>COUNTRY</label>
                <select id="country">
                    <option value="">Select Country</option>
                    <option>Pakistan</option>
                    <option>India</option>
                    <option>Indonesia</option>
                    <option>Zambia</option>
                    <option>Mozambique</option>
                    <option>Sudan</option>
                    <option>Kyrgyzstan</option>
                    <option>Ukraine</option>
                </select>
            </div>
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="regUsername" placeholder="Choose username">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="regPassword" placeholder="Choose password">
            </div>
            <div class="input-group">
                <label>CONFIRM PASSWORD</label>
                <input type="password" id="confirmPass" placeholder="Confirm password">
            </div>
            <button class="btn" onclick="handleRegister()">SUBMIT REGISTRATION</button>
            <div class="info-note">
                <i>🔒 Registration requires admin approval</i>
            </div>
        </div>

        <div class="support">
            Official Support Channel: <a href="#">@sms_panel_official</a>
        </div>
    </div>

    <script>
        // Show tab function
        function showTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            
            if(tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        // Random security question
        const num1 = Math.floor(Math.random() * 10) + 1;
        const num2 = Math.floor(Math.random() * 10) + 1;
        document.getElementById('securityQuestion').innerHTML = num1 + ' + ' + num2 + ' = ?';
        const correctAnswer = (num1 + num2).toString();

        // Handle Login
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const securityAnswer = document.getElementById('securityAnswer').value;

            if(securityAnswer !== correctAnswer) {
                alert('Security check failed!');
                return;
            }

            // Check admin
            if(username === 'Syedhacker' && password === '0345Syeddlr') {
                alert('Access Granted! Welcome Admin.');
                window.location.href = 'admin.html';
                return;
            }

            // Check normal users
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if(user && user.approved) {
                alert('Access Granted! Welcome ' + username);
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'dashboard.html';
            } else if(user && !user.approved) {
                alert('Account pending approval!');
            } else {
                alert('Invalid credentials!');
            }
        }

        // Handle Register
        function handleRegister() {
            const fullname = document.getElementById('fullname').value;
            const country = document.getElementById('country').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirmPass = document.getElementById('confirmPass').value;

            if(!fullname || !country || !username || !password) {
                alert('Please fill all fields!');
                return;
            }

            if(password !== confirmPass) {
                alert('Passwords do not match!');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const pending = JSON.parse(localStorage.getItem('pending') || '[]');

            if(users.find(u => u.username === username) || pending.find(u => u.username === username)) {
                alert('Username already exists!');
                return;
            }

            const newUser = {
                id: Date.now(),
                fullname: fullname,
                country: country,
                username: username,
                password: password,
                approved: false,
                createdAt: new Date().toISOString()
            };

            pending.push(newUser);
            localStorage.setItem('pending', JSON.stringify(pending));

            alert('Registration submitted! Wait for admin approval.');
            showTab('login');
        }

        // Initialize users
        if(!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([]));
        }
        if(!localStorage.getItem('pending')) {
            localStorage.setItem('pending', JSON.stringify([]));
        }
    </script>
</body>
</html>
